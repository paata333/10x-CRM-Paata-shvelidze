<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up · 10X CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Runs first and synchronously: if a session already exists, leave
       immediately so an authenticated user never sees the signup form. -->
  <script src="js/guard.js"></script>
  <script>redirectIfAuthed();</script>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="brand-mark">
        <span class="brand-mark__glyph">×10</span>
        <span class="brand-mark__text">10X CRM</span>
      </div>

      <h1>Create your account</h1>
      <p class="auth-sub">Start managing your pipeline in minutes.</p>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Jane Cooper" autocomplete="name" />
          <div class="field-error" id="fullName-error"></div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="text" id="email" name="email" placeholder="jane@company.com" autocomplete="email" />
          <div class="field-error" id="email-error"></div>
        </div>

        <div class="field">
          <label for="company">Company</label>
          <input type="text" id="company" name="company" placeholder="Company (optional)" autocomplete="organization" />
          <div class="field-error" id="company-error"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" />
          <div class="field-error" id="password-error"></div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" />
          <div class="field-error" id="confirmPassword-error"></div>
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Log in</a>
      </div>
    </div>
  </main>

  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script>initSignupForm();</script>
</body>
</html>
